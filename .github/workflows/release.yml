name: Release

on:
  release:
    types: [published]

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: imagick
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package app
        run: |
          mkdir -p build/artifacts/appstore
          tar --transform 's,^\.,imageconverter,' -czf build/artifacts/appstore/imageconverter.tar.gz \
            --exclude='./.git*' \
            --exclude='./.github' \
            --exclude='./node_modules' \
            --exclude='./tests' \
            --exclude='./src' \
            --exclude='./build' \
            --exclude='./screenshots' \
            --exclude='./Makefile' \
            --exclude='./package.json' \
            --exclude='./package-lock.json' \
            --exclude='./composer.json' \
            --exclude='./composer.lock' \
            --exclude='./vite.config.js' \
            --exclude='./tsconfig.json' \
            --exclude='./phpunit*.xml' \
            --exclude='./phpcs.xml.dist' \
            --exclude='./phpstan.neon.dist' \
            --exclude='./.eslintrc.cjs' \
            --exclude='./.prettierrc.json' \
            --exclude='./.remember' \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imageconverter-${{ github.event.release.tag_name }}
          path: build/artifacts/appstore/imageconverter.tar.gz

      - name: Attach tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/appstore/imageconverter.tar.gz
